<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Flynn</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 640px;
            margin: 0 auto;
            padding: 2rem 1rem;
            background: #fafafa;
            color: #333;
            line-height: 1.6;
        }
        header { margin-bottom: 2rem; }
        h1 {
            font-weight: 400;
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
        }
        nav { display: flex; gap: 1rem; flex-wrap: wrap; }
        nav a {
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
        }
        nav a:hover { color: #000; }
        .section { display: none; }
        .section.active { display: block; }
        h2 { font-weight: 400; font-size: 1.1rem; }

        /* About */
        .about { display: flex; gap: 1.5rem; align-items: flex-start; }
        .about img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .about p { margin: 0; }

        /* Markdown lists (blog + projects) */
        .md-list { list-style: none; padding: 0; }
        .md-list li { margin-bottom: 0.75rem; }
        .md-list a { color: #333; text-decoration: none; }
        .md-list a:hover { text-decoration: underline; }
        .md-list .date {
            color: #999;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        .md-list .desc {
            display: block;
            color: #666;
            font-size: 0.85rem;
        }

        /* Markdown content */
        .md-content { line-height: 1.7; }
        .md-content h1 { font-size: 1.3rem; margin-top: 0; }
        .back { font-size: 0.85rem; margin-bottom: 1rem; display: inline-block; color: #555; text-decoration: none; }
        .back:hover { color: #000; }

        /* Links */
        .links-list { list-style: none; padding: 0; }
        .links-list li { margin-bottom: 0.5rem; }
        .links-list a { color: #333; text-decoration: none; }
        .links-list a:hover { text-decoration: underline; }

        /* Hello */
        button {
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.5rem 1.2rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            color: #333;
            cursor: pointer;
        }
        button:hover { border-color: #999; }
        #hello-result {
            font-size: 0.85rem;
            color: #666;
            min-height: 1.2em;
            margin-top: 0.75rem;
        }

        /* PayPal */
        .paypal-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .paypal-btn:hover { border-color: #999; }
    </style>
</head>
<body>
    <header>
        <h1>Daniel Flynn</h1>
        <nav id="nav"></nav>
    </header>

    <!-- About -->
    <div id="section-about" class="section">
        <div class="about">
            <img src="/images/headshot.jpg" alt="Daniel Flynn">
            <div>
                <p>Daniel Flynn is ... <!-- TODO: replace with your bio --></p>
            </div>
        </div>
    </div>

    <!-- Blog -->
    <div id="section-blog" class="section">
        <div id="blog-list">
            <h2>Posts</h2>
            <ul class="md-list" id="blog-list-ul"></ul>
        </div>
        <div id="blog-post" style="display:none;">
            <a href="/blog" class="back">&larr; Back to posts</a>
            <div class="md-content" id="blog-content"></div>
        </div>
    </div>

    <!-- Projects -->
    <div id="section-projects" class="section">
        <div id="projects-list">
            <h2>Projects</h2>
            <ul class="md-list" id="projects-list-ul"></ul>
        </div>
        <div id="projects-post" style="display:none;">
            <a href="/projects" class="back">&larr; Back to projects</a>
            <div class="md-content" id="projects-content"></div>
        </div>
    </div>

    <!-- Links -->
    <div id="section-links" class="section">
        <h2>Links</h2>
        <ul class="links-list">
            <li><a href="https://github.com/TODO" target="_blank" rel="noopener noreferrer">GitHub</a></li>
            <li><a href="https://linkedin.com/in/TODO" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
            <li><a href="mailto:TODO@example.com">Email</a></li>
        </ul>
    </div>

    <!-- Hello -->
    <div id="section-hello" class="section">
        <button onclick="sayHello()">Say hello</button>
        <div id="hello-result"></div>
    </div>

    <!-- PayPal -->
    <div id="section-paypal" class="section">
        <p>Buy me a coffee?</p>
        <a href="https://paypal.me/danielcflynn" target="_blank" rel="noopener noreferrer" class="paypal-btn">PayPal</a>
    </div>

    <script>
        const API = "https://api.danielflynn.site";
        let flags = {};

        // Nav order
        const NAV_ITEMS = [
            { key: "about",    label: "About",    path: "/about" },
            { key: "blog",     label: "Blog",     path: "/blog" },
            { key: "projects", label: "Projects", path: "/projects" },
            { key: "links",    label: "Links",    path: "/links" },
            { key: "hello",    label: "Hello",    path: "/hello" },
            { key: "paypal",   label: "PayPal",   path: "/paypal" },
        ];

        function getPath() {
            const params = new URLSearchParams(location.search);
            const redirected = params.get("p");
            if (redirected) {
                history.replaceState(null, "", redirected);
                return redirected;
            }
            return location.pathname;
        }

        function navigate(path) {
            history.pushState(null, "", path);
            route();
        }

        async function init() {
            try {
                const res = await fetch(API + "/flags");
                flags = await res.json();
            } catch {
                flags = {};
            }
            buildNav();
            route();
            window.addEventListener("popstate", route);

            document.addEventListener("click", (e) => {
                const a = e.target.closest("a");
                if (!a) return;
                const href = a.getAttribute("href");
                if (!href || href.startsWith("http") || href.startsWith("//") || href.startsWith("mailto:")) return;
                e.preventDefault();
                navigate(href);
            });
        }

        function buildNav() {
            const nav = document.getElementById("nav");
            nav.innerHTML = NAV_ITEMS
                .filter(item => flags[item.key])
                .map(item => `<a href="${item.path}">${item.label}</a>`)
                .join("");
        }

        function firstEnabledSection() {
            const item = NAV_ITEMS.find(i => flags[i.key]);
            return item ? item.key : "";
        }

        function route() {
            const path = getPath();
            const parts = path.split("/").filter(Boolean);
            const section = parts[0] || firstEnabledSection();

            if (section && !flags[section]) {
                const fallback = firstEnabledSection();
                history.replaceState(null, "", "/" + fallback);
                route();
                return;
            }

            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));

            const hasSubpage = (section === "blog" || section === "projects") && parts[1];

            if (hasSubpage) {
                document.getElementById("section-" + section).classList.add("active");
                showMarkdownPost(section, parts[1]);
            } else {
                const el = document.getElementById("section-" + section);
                if (el) el.classList.add("active");
                if (section === "blog") showMarkdownList("blog");
                if (section === "projects") showMarkdownList("projects");
            }
        }

        // --- Shared markdown list/post rendering ---

        const listCache = {};

        async function showMarkdownList(section) {
            document.getElementById(section + "-list").style.display = "";
            document.getElementById(section + "-post").style.display = "none";
            const ul = document.getElementById(section + "-list-ul");
            if (ul.children.length > 0) return;

            const jsonPath = section === "blog" ? "/blog/posts.json" : "/projects/projects.json";

            try {
                const res = await fetch(jsonPath);
                const items = await res.json();
                listCache[section] = items;
                ul.innerHTML = items.map(item => {
                    const desc = item.description ? `<span class="desc">${item.description}</span>` : "";
                    return `<li><a href="/${section}/${item.slug}">${item.title}</a><span class="date">${item.date}</span>${desc}</li>`;
                }).join("");
            } catch {
                ul.innerHTML = "<li>Could not load content.</li>";
            }
        }

        async function showMarkdownPost(section, slug) {
            document.getElementById(section + "-list").style.display = "none";
            document.getElementById(section + "-post").style.display = "";
            const content = document.getElementById(section + "-content");
            content.innerHTML = "Loading...";

            const basePath = section === "blog" ? "/blog" : "/projects";

            try {
                const res = await fetch(`${basePath}/${slug}.md`);
                if (!res.ok) throw new Error();
                const md = await res.text();
                content.innerHTML = marked.parse(md);
            } catch {
                content.innerHTML = "Not found.";
            }
        }

        // --- Hello ---

        async function sayHello() {
            const el = document.getElementById("hello-result");
            el.textContent = "Loading...";
            try {
                const res = await fetch(API + "/hello");
                const data = await res.json();
                el.textContent = `${data.message} Visit #${data.visitCount} — last visit: ${data.lastVisit}`;
            } catch {
                el.textContent = "Could not reach the API.";
            }
        }

        init();
    </script>
</body>
</html>
