<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Flynn</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 640px;
            margin: 0 auto;
            padding: 2rem 1rem;
            background: #fafafa;
            color: #333;
            line-height: 1.6;
        }
        header { margin-bottom: 2rem; }
        h1 {
            font-weight: 400;
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
        }
        nav { display: flex; gap: 1rem; }
        nav a {
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
        }
        nav a:hover { color: #000; }
        .section { display: none; }
        .section.active { display: block; }
        .post-list { list-style: none; padding: 0; }
        .post-list li { margin-bottom: 0.75rem; }
        .post-list a {
            color: #333;
            text-decoration: none;
        }
        .post-list a:hover { text-decoration: underline; }
        .post-list .date {
            color: #999;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        .post-content { line-height: 1.7; }
        .post-content h1 { font-size: 1.3rem; margin-top: 0; }
        .back { font-size: 0.85rem; margin-bottom: 1rem; display: inline-block; color: #555; text-decoration: none; }
        .back:hover { color: #000; }
        button {
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.5rem 1.2rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            color: #333;
            cursor: pointer;
        }
        button:hover { border-color: #999; }
        #hello-result {
            font-size: 0.85rem;
            color: #666;
            min-height: 1.2em;
            margin-top: 0.75rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Daniel Flynn</h1>
        <nav id="nav"></nav>
    </header>

    <div id="section-blog" class="section">
        <div id="blog-list">
            <h2 style="font-weight:400; font-size:1.1rem;">Posts</h2>
            <ul class="post-list" id="post-list"></ul>
        </div>
        <div id="blog-post" style="display:none;">
            <a href="/blog" class="back">&larr; Back to posts</a>
            <div class="post-content" id="post-content"></div>
        </div>
    </div>

    <div id="section-hello" class="section">
        <button onclick="sayHello()">Say hello</button>
        <div id="hello-result"></div>
    </div>

    <div id="section-paypal" class="section">
        <p>Buy me a coffee?</p>
        <a href="https://paypal.me/danielcflynn" target="_blank" rel="noopener noreferrer"
           style="display:inline-block; padding:0.5rem 1.2rem; border:1px solid #ccc; border-radius:4px; background:#fff; color:#333; text-decoration:none; font-size:0.9rem;">
            PayPal
        </a>
    </div>

    <script>
        const API = "https://api.danielflynn.site";
        let flags = {};

        function getPath() {
            // On redirect from 404.html, path arrives as ?p=/blog etc.
            const params = new URLSearchParams(location.search);
            const redirected = params.get("p");
            if (redirected) {
                history.replaceState(null, "", redirected);
                return redirected;
            }
            return location.pathname;
        }

        function navigate(path) {
            history.pushState(null, "", path);
            route();
        }

        async function init() {
            try {
                const res = await fetch(API + "/flags");
                flags = await res.json();
            } catch {
                flags = {};
            }
            buildNav();
            route();
            window.addEventListener("popstate", route);

            // Intercept link clicks for client-side navigation
            document.addEventListener("click", (e) => {
                const a = e.target.closest("a");
                if (!a) return;
                const href = a.getAttribute("href");
                if (!href || href.startsWith("http") || href.startsWith("//")) return;
                e.preventDefault();
                navigate(href);
            });
        }

        function buildNav() {
            const nav = document.getElementById("nav");
            const links = [];
            if (flags.blog) links.push('<a href="/blog">Blog</a>');
            if (flags.hello) links.push('<a href="/hello">Hello</a>');
            if (flags.paypal) links.push('<a href="/paypal">PayPal</a>');
            nav.innerHTML = links.join("");
        }

        function route() {
            const path = getPath();
            const parts = path.split("/").filter(Boolean);
            const section = parts[0] || (flags.blog ? "blog" : "hello");

            // Enforce flags
            if (section && !flags[section]) {
                const fallback = Object.keys(flags).find(k => flags[k]) || "";
                history.replaceState(null, "", "/" + fallback);
                route();
                return;
            }

            document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));

            if (section === "blog" && parts[1]) {
                document.getElementById("section-blog").classList.add("active");
                showPost(parts[1]);
            } else {
                const el = document.getElementById("section-" + section);
                if (el) el.classList.add("active");
                if (section === "blog") showBlogList();
            }
        }

        async function showBlogList() {
            document.getElementById("blog-list").style.display = "";
            document.getElementById("blog-post").style.display = "none";
            const list = document.getElementById("post-list");
            if (list.children.length > 0) return;

            try {
                const res = await fetch("/blog/posts.json");
                const posts = await res.json();
                list.innerHTML = posts.map(p =>
                    `<li><a href="/blog/${p.slug}">${p.title}</a><span class="date">${p.date}</span></li>`
                ).join("");
            } catch {
                list.innerHTML = "<li>Could not load posts.</li>";
            }
        }

        async function showPost(slug) {
            document.getElementById("blog-list").style.display = "none";
            document.getElementById("blog-post").style.display = "";
            const content = document.getElementById("post-content");
            content.innerHTML = "Loading...";

            try {
                const res = await fetch(`/blog/${slug}.md`);
                if (!res.ok) throw new Error();
                const md = await res.text();
                content.innerHTML = marked.parse(md);
            } catch {
                content.innerHTML = "Post not found.";
            }
        }

        async function sayHello() {
            const el = document.getElementById("hello-result");
            el.textContent = "Loading...";
            try {
                const res = await fetch(API + "/hello");
                const data = await res.json();
                el.textContent = `${data.message} Visit #${data.visitCount} — last visit: ${data.lastVisit}`;
            } catch {
                el.textContent = "Could not reach the API.";
            }
        }

        init();
    </script>
</body>
</html>
